<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romu Dashboard - Local Setup</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="nexus.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .local-info {
            background: #f0f0f0;
            padding: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #007acc;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="local-info">
            <h2>Local Testing Mode</h2>
            <p>This dashboard uses URL segments (e.g., <code>/event_code/team_number</code>) to load data.</p>
            <p>To test locally, you can use the following links or manual URLs:</p>
            <ul id="local-links">
                <li><a href="?event=2024nytr&team=1234">Test Event 2024nytr, Team 1234</a></li>
            </ul>
        </div>
        <h1>Shore Dashboard</h1>
        <div id="content">
            <p>Loading...</p>
        </div>
    </div>

    <script>
        // Check for query parameters if testing locally without a specialized server
        const urlParams = new URLSearchParams(window.location.search);
        const qEvent = urlParams.get('event');
        const qTeam = urlParams.get('team');
        
        if (qEvent || qTeam) {
            console.log("Local query params detected:", {qEvent, qTeam});
            // You might want to override parseURL in nexus.js for local testing
            // or just ensure the server handles the routing.
        }
    </script>
</body>
</html>
